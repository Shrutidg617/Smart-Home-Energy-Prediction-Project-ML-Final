<!DOCTYPE html>
<html>
<head>
<title>Smart Energy AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f4f4f4;
}

.container {
    background: linear-gradient(135deg, #355070, #6d597a);
    padding: 20px;
    margin: 50px auto;
    width: 420px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

input, button {
    margin: 10px;
    padding: 8px;
    width: 80%;
}

h2, h6 {
    color: white;
}

canvas {
    margin-top: 20px;
    background: white;
    border-radius: 10px;
    padding: 10px;
}
.energy-img {
    width: 140px;
    border-radius: 18px;
    
    box-shadow: 
        0 8px 20px rgba(0, 0, 0, 0.15),
        0 2px 6px rgba(0, 0, 0, 0.1);

    transition: all 0.35s ease;
    background: rgba(255, 255, 255, 0.05);
    padding: 10px;
}

.energy-img:hover {
    transform: translateY(-4px) scale(1.03);
    
    box-shadow: 
        0 12px 30px rgba(0, 0, 0, 0.2),
        0 4px 10px rgba(0, 0, 0, 0.15);
}
.energy-img {
    backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<div class="container">
    <img src="static/images/energy.png" height="150px" class="energy-img"> <br>

<h2>Smart Home Energy AI</h2>

<form id="form">
<input id="hour" placeholder="Hour (0-23) e.g. 14" required><br>
<input id="date" placeholder="Date (1-31) e.g. 15" required><br>
<input id="month" placeholder="Month (1-12) e.g. 6" required><br>
<input id="year" placeholder="Year e.g. 2017" required><br>

<button class="btn btn-light">Predict</button>
</form>

<h6 id="result"></h6>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<ul id="tips" style="color:white; text-align:left;"></ul>

</div>

<script>
let chart1, chart2;

document.getElementById('form').onsubmit = async (e)=>{
e.preventDefault();

const res = await fetch('/predict',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
hour: hour.value,
date: date.value,
month: month.value,
year: year.value
})
});

const data = await res.json();

result.innerHTML =
`<b>Prediction:</b> ${(data.prediction || 0).toFixed(2)} <br>
<b>Weather:</b> ${data.temp || 0}°C | ${data.humidity || 0}%`;

tips.innerHTML = (data.appliance_tips || []).map(t=>`<li>${t}</li>`).join('');

if(chart1) chart1.destroy();
const ctx1 = document.getElementById('chart1').getContext('2d');

chart1 = new Chart(ctx1, {
type: 'line',
data: {
labels: [...Array(24).keys()],
datasets: [{
label: 'Hourly Energy (MW)',
data: data.hourly_data || [],
borderWidth: 2
}]
}
});

if(chart2) chart2.destroy();
const ctx2 = document.getElementById('chart2').getContext('2d');

chart2 = new Chart(ctx2, {
type: 'bar',
data: {
labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets: [{
label: 'Weekly Forecast',
data: data.weekly_data || []
}]
}
});
};
</script>

</body>
</html>
