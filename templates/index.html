<!DOCTYPE html>
<html>
<head>
<title>Smart Energy AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f4f4f4;
}

.container {
    background: linear-gradient(135deg, #355070, #6d597a);
    padding: 20px;
    margin: 50px auto;
    width: 420px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

input, button {
    margin: 10px;
    padding: 8px;
    width: 80%;
}

h2, h6 {
    color: white;
}

canvas {
    margin-top: 20px;
    background: white;
    border-radius: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Smart Home Energy AI</h2>

<form id="form">
<input id="hour" placeholder="Hour (0-23)" required><br>
<input id="day" placeholder="Day (0=Mon)" required><br>
<input id="month" placeholder="Month" required><br>
<input id="year" placeholder="Year" required><br>

<button class="btn btn-light">Predict</button>
</form>

<h6 id="result"></h6>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<ul id="tips" style="color:white; text-align:left;"></ul>

</div>

<script>
let chart1, chart2;

document.getElementById('form').onsubmit = async (e)=>{
e.preventDefault();

const res = await fetch('/predict',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
hour:hour.value,
dayofweek:day.value,
month:month.value,
year:year.value
})
});

const data = await res.json();

result.innerHTML =
`<b>Prediction:</b> ${data.prediction.toFixed(2)} <br>
<b>Cost:</b> $${data.cost.toFixed(2)} <br>
<b>Score:</b> ${data.score.toFixed(0)}/100 <br>
<b>Weather:</b> ${data.temp}°C | ${data.humidity}% <br>
${data.alert}`;

tips.innerHTML = data.appliance_tips.map(t=>`<li>${t}</li>`).join('');

if(chart1) chart1.destroy();
const ctx1 = document.getElementById('chart1').getContext('2d');

chart1 = new Chart(ctx1, {
type: 'line',
data: {
labels: [...Array(24).keys()],
datasets: [{
label: 'Hourly Energy (MW)',
data: data.hourly_data,
borderWidth: 2
}]
}
});

if(chart2) chart2.destroy();
const ctx2 = document.getElementById('chart2').getContext('2d');

chart2 = new Chart(ctx2, {
type: 'bar',
data: {
labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
datasets: [{
label: 'Weekly Forecast',
data: data.weekly_data
}]
}
});
};
</script>

</body>
</html>
