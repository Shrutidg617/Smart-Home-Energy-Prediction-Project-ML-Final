<!DOCTYPE html>
<html>
<head>
    <title>Energy Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            background: linear-gradient(135deg, #355070, #6d597a);
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, button {
            margin: 10px;
            padding: 8px;
            width: 80%;
        }
        button {
            background-color: white;
            color: black;
            border: none;
        }
        h2, h6{
            color: white;
        }
        img {
            margin-bottom: 10px;
        }
        .custom-btn {
            margin-top: 15px;
            width: 80%;
        }
    </style>
    
    
</head>
<body>

<div class="container">
    <img src="/static/images/energy.png" width="100" />
    <h2>Smart Home energy prediction</h2>

    <form id="form">
        <input type="number" id="hour" placeholder="Hour (0-23)"><br>
        <input type="number" id="day" placeholder="Day of Week (0=Mon)"><br>
        <input type="number" id="month" placeholder="Month (1-12)"><br>
        <input type="number" id="year" placeholder="Year"><br>

        <!-- <button type="submit">Predict</button> -->
        <button type="submit" class="btn btn-outline-light custom-btn">Predict</button>
    </form>

    <h6 id="result"></h6>
</div>

<script>
document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            hour: document.getElementById('hour').value,
            dayofweek: document.getElementById('day').value,
            month: document.getElementById('month').value,
            year: document.getElementById('year').value
        })
    });

    const data = await res.json();
    // document.getElementById('result').innerText = "Prediction: " + data.prediction;

    // document.getElementById('result').innerHTML =
    // "<b>Prediction:</b><br>" + data.prediction;

    document.getElementById('result').innerHTML =
    "<b>Prediction:</b> " + data.prediction.toFixed(2) +
    "<br><b>~Suggestion:</b> " + data.suggestion +
    "<br><b>Estimated Cost:</b> $" + data.cost.toFixed(2);
}
</script>


</body>
</html>
